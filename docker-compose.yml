version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    env_file:
      - .env.example
    depends_on:
      - backend

  desktop:
    build:
      context: ./desktop
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./desktop:/app
      - /app/node_modules
    env_file:
      - .env.example
    depends_on:
      - backend

volumes:
  pgdata:
